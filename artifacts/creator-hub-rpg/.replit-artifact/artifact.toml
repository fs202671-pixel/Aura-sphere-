kind = "web"
previewPath = "/creator-hub/"
title = "Creator Hub RPG"
version = "1.0.0"
id = "artifacts/creator-hub-rpg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/creator-hub/" ]
localPort = 21990

[services.development]
run = "pnpm --filter @workspace/creator-hub-rpg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creator-hub-rpg", "run", "build" ]
publicDir = "artifacts/creator-hub-rpg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21990"
BASE_PATH = "/creator-hub/"
