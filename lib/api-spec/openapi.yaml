openapi: 3.1.0
info:
  title: CAOS API
  version: 0.1.0
  description: CAOS — Creative AI Operating System. API unificada do ecossistema CAOS (Shell, Nexus, Studio).

servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: items
    description: RPG item library management
  - name: themes
    description: Theme engine and design system
  - name: agents
    description: AI agent (IA) builder
  - name: skills
    description: Pluggable skill modules
  - name: projects
    description: Project builder

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── ITEMS ───────────────────────────────────────────────────────
  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all RPG items in the library
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [design, theme, agent, skill, project, component]
        - name: rarity
          in: query
          required: false
          schema:
            type: string
            enum: [Common, Rare, Epic, Legendary]
        - name: tags
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create a new RPG item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/stats:
    get:
      operationId: getItemStats
      tags: [items]
      summary: Get inventory stats (counts by type, rarity, recent activity)
      responses:
        "200":
          description: Inventory stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryStats"

  /items/recent:
    get:
      operationId: getRecentItems
      tags: [items]
      summary: Get recently created items
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /items/{id}/clone:
    post:
      operationId: cloneItem
      tags: [items]
      summary: Clone an existing item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Cloned item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  # ─── THEMES ──────────────────────────────────────────────────────
  /themes:
    get:
      operationId: listThemes
      tags: [themes]
      summary: List all theme items
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Theme"
    post:
      operationId: createTheme
      tags: [themes]
      summary: Create a new theme item (manually or from design extraction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeInput"
      responses:
        "201":
          description: Created theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"

  /themes/{id}:
    get:
      operationId: getTheme
      tags: [themes]
      summary: Get theme detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Theme detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
    delete:
      operationId: deleteTheme
      tags: [themes]
      summary: Delete a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /themes/{id}/apply:
    post:
      operationId: applyTheme
      tags: [themes]
      summary: Apply a theme to a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeApplyRequest"
      responses:
        "200":
          description: Theme applied result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeApplyResult"

  /themes/extract:
    post:
      operationId: extractTheme
      tags: [themes]
      summary: Extract a theme from image analysis (Design Extractor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeExtractRequest"
      responses:
        "200":
          description: Extracted theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"

  # ─── AI AGENTS ───────────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all AI agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new AI agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /agents/{id}/run:
    post:
      operationId: runAgent
      tags: [agents]
      summary: Run an AI agent with a prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunRequest"
      responses:
        "200":
          description: Agent run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"

  # ─── SKILLS ──────────────────────────────────────────────────────
  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skill modules
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: createSkill
      tags: [skills]
      summary: Create a new skill module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Created skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  /skills/{id}:
    get:
      operationId: getSkill
      tags: [skills]
      summary: Get skill detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
    patch:
      operationId: updateSkill
      tags: [skills]
      summary: Update a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillUpdate"
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
    delete:
      operationId: deleteSkill
      tags: [skills]
      summary: Delete a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /skills/{id}/plug:
    post:
      operationId: plugSkill
      tags: [skills]
      summary: Plug a skill into a project or agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillPlugRequest"
      responses:
        "200":
          description: Plug result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillPlugResult"

  # ─── PROJECTS ────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/build:
    post:
      operationId: buildProject
      tags: [projects]
      summary: Trigger project build (generates structure/scaffold)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Build result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBuildResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── ITEM ────────────────────────────────────────────────────
    Item:
      type: object
      required: [id, name, type, rarity, tags, previewUrl, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [design, theme, agent, skill, project, component]
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        tags:
          type: array
          items:
            type: string
        previewUrl:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    ItemInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [design, theme, agent, skill, project, component]
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        tags:
          type: array
          items:
            type: string
        previewUrl:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ItemUpdate:
      type: object
      properties:
        name:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        tags:
          type: array
          items:
            type: string
        previewUrl:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    InventoryStats:
      type: object
      required: [total, byType, byRarity, legendaryCount, recentDrops]
      properties:
        total:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        byRarity:
          type: object
          additionalProperties:
            type: integer
        legendaryCount:
          type: integer
        recentDrops:
          type: array
          items:
            $ref: "#/components/schemas/Item"

    # ─── THEME ───────────────────────────────────────────────────
    Theme:
      type: object
      required: [id, name, rarity, colors, fonts, layoutStyle, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        colors:
          type: array
          items:
            type: string
        fonts:
          type: array
          items:
            type: string
        layoutStyle:
          type: string
        spacing:
          type: ["string", "null"]
        borderRadius:
          type: ["string", "null"]
        previewUrl:
          type: ["string", "null"]
        sourceImageUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ThemeInput:
      type: object
      required: [name, colors, layoutStyle]
      properties:
        name:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        colors:
          type: array
          items:
            type: string
        fonts:
          type: array
          items:
            type: string
        layoutStyle:
          type: string
        spacing:
          type: string
        borderRadius:
          type: string
        previewUrl:
          type: string
        sourceImageUrl:
          type: string
        tags:
          type: array
          items:
            type: string

    ThemeApplyRequest:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: integer

    ThemeApplyResult:
      type: object
      required: [success, message, projectId, themeId]
      properties:
        success:
          type: boolean
        message:
          type: string
        projectId:
          type: integer
        themeId:
          type: integer

    ThemeExtractRequest:
      type: object
      required: [imageUrl, name]
      properties:
        imageUrl:
          type: string
        name:
          type: string
        style:
          type: string

    # ─── AGENT ───────────────────────────────────────────────────
    Agent:
      type: object
      required: [id, name, behavior, rarity, promptBase, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        behavior:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        promptBase:
          type: string
        description:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        pluggedSkillIds:
          type: array
          items:
            type: integer
        runCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AgentInput:
      type: object
      required: [name, behavior, promptBase]
      properties:
        name:
          type: string
        behavior:
          type: string
        promptBase:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        description:
          type: string
        avatar:
          type: string

    AgentUpdate:
      type: object
      properties:
        name:
          type: string
        behavior:
          type: string
        promptBase:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        description:
          type: string
        avatar:
          type: string

    AgentRunRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string

    AgentRunResult:
      type: object
      required: [agentId, prompt, result, runAt]
      properties:
        agentId:
          type: integer
        prompt:
          type: string
        result:
          type: string
        runAt:
          type: string
          format: date-time

    # ─── SKILL ───────────────────────────────────────────────────
    Skill:
      type: object
      required: [id, name, category, description, rarity, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        icon:
          type: ["string", "null"]
        behavior:
          type: ["string", "null"]
        pluggedCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    SkillInput:
      type: object
      required: [name, category, description]
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        icon:
          type: string
        behavior:
          type: string

    SkillUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        icon:
          type: string
        behavior:
          type: string

    SkillPlugRequest:
      type: object
      required: [targetType, targetId]
      properties:
        targetType:
          type: string
          enum: [agent, project]
        targetId:
          type: integer

    SkillPlugResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    # ─── PROJECT ─────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, rarity, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        status:
          type: string
          enum: [draft, building, complete, archived]
        themeId:
          type: ["integer", "null"]
        agentIds:
          type: array
          items:
            type: integer
        skillIds:
          type: array
          items:
            type: integer
        previewUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        rarity:
          type: string
          enum: [Common, Rare, Epic, Legendary]
        themeId:
          type: integer
        agentIds:
          type: array
          items:
            type: integer
        skillIds:
          type: array
          items:
            type: integer

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, building, complete, archived]
        themeId:
          type: integer
        agentIds:
          type: array
          items:
            type: integer
        skillIds:
          type: array
          items:
            type: integer

    ProjectBuildResult:
      type: object
      required: [success, message, projectId, generatedFiles]
      properties:
        success:
          type: boolean
        message:
          type: string
        projectId:
          type: integer
        generatedFiles:
          type: array
          items:
            type: string
